# Project Configuration

# Site Settings
site:
  title: "Jonathan Solomon - Infrastructure Engineer & Innovator"
  description: "Infrastructure Engineer at Apple Vision Products Group, Founder of DC Electric Skateboarding, and SkillsUSA National Gold Medalist"
  author: "Jonathan Solomon"
  email: "jonathan@gojsg.com"
  url: "https://jonny.sh"

# Theme Settings
theme:
  primaryColor: "#0070f3"
  secondaryColor: "#1a1a1a"
  font:
    family: "Inter, system-ui, sans-serif"
    size: "16px"

# Build Settings
build:
  outputDir: "_site"
  base: "/"
  assetsDir: "assets"

# Content Settings
content:
  postsPerPage: 10
  excerptLength: 200
  dateFormat: "MMMM D, YYYY"

# Features
features:
  darkMode: true
  analytics: false
  comments: false
  rssFeed: true

# Social Links
social:
  github: "https://github.com/Jonnysol"
  twitter: "https://twitter.com/TheJonSowl"
  linkedin: "https://linkedin.com/in/Jonsol"

# SEO Settings
seo:
  twitterCard: "summary_large_image"
  openGraph:
    type: "website"
    locale: "en_US"
    siteName: "Jonathan Solomon - Infrastructure Engineer & Innovator"
